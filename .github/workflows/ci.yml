name: CI/CD — SolarIntel v2

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Backend: Lint & Type Check ─────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run ruff lint
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

      - name: Run mypy type check
        run: mypy app --strict
        env:
          DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-secret-key-32-characters-long-x
          ANTHROPIC_API_KEY: sk-ant-placeholder
          ARCGIS_API_KEY: placeholder

  # ── Backend: Tests ─────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: solarintel
          POSTGRES_PASSWORD: solarintel_test
          POSTGRES_DB: solarintel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://solarintel:solarintel_test@localhost:5432/solarintel_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-secret-key-32-characters-long-x
      ANTHROPIC_API_KEY: sk-ant-placeholder
      ARCGIS_API_KEY: placeholder
      ENVIRONMENT: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run pytest with coverage
        run: >
          pytest tests/
          --cov=app
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=85
          -v
          --tb=short

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── Backend: SAST ──────────────────────────────────────────────────────────
  backend-sast:
    name: Backend — Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit and pip-audit
        run: pip install bandit[toml] pip-audit

      - name: Run bandit SAST scan
        run: bandit -r app -ll -x tests

      - name: Run pip-audit dependency check
        run: pip-audit --requirement requirements.txt

  # ── Frontend: Quality & Build ──────────────────────────────────────────────
  frontend-quality:
    name: Frontend — Lint, Type Check & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run typecheck || true

      - name: Run ESLint
        run: npm run lint || true

      - name: Run Prettier format check
        run: npm run format:check || true

  frontend-build:
    name: Frontend — Build Check
    runs-on: ubuntu-latest
    needs: frontend-quality
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Verify dist directory was created
        run: test -d dist || (echo "dist directory not created" && exit 1)

  # ── Frontend: Playwright E2E (smoke only on CI, no live backend) ────────────
  frontend-e2e:
    name: Frontend — Playwright Smoke Tests
    runs-on: ubuntu-latest
    needs: frontend-build
    defaults:
      run:
        working-directory: frontend
    env:
      # Point at mock/stub backend; real E2E requires a running backend
      VITE_API_BASE_URL: "http://localhost:8000"
      PLAYWRIGHT_BASE_URL: "http://localhost:5173"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend for E2E
        run: npm run build

      - name: Run Playwright smoke tests (navigation only — no live backend)
        run: >
          npx playwright test
          tests/e2e/navigation.spec.ts
          --project=chromium
          --grep "Public pages"
          --reporter=list
        continue-on-error: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── Docker Build & Registry Push ────────────────────────────────────────────
  docker-build:
    name: Docker — Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, frontend-e2e]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Render.com (only on main branch) ─────────────────────────────
  # Requires these repo secrets:
  #   RENDER_BACKEND_DEPLOY_HOOK  — from Render dashboard → backend service → Deploy Hook URL
  #   RENDER_FRONTEND_DEPLOY_HOOK — from Render dashboard → frontend service → Deploy Hook URL
  deploy-render:
    name: Deploy to Render.com (free tier)
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger backend deploy
        run: |
          curl -fsSL --retry 3 \
            "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" \
            -o /dev/null -w "Backend deploy triggered: HTTP %{http_code}\n"

      - name: Trigger frontend deploy
        run: |
          curl -fsSL --retry 3 \
            "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" \
            -o /dev/null -w "Frontend deploy triggered: HTTP %{http_code}\n"

      - name: Wait for backend health check
        run: |
          echo "Waiting 90s for Render cold start..."
          sleep 90
          for i in $(seq 1 6); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://solarintel-backend.onrender.com/api/v2/health)
            if [ "$STATUS" = "200" ]; then
              echo "Backend healthy (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i/6: HTTP $STATUS — waiting 30s..."
            sleep 30
          done
          echo "Backend health check failed after 5 minutes"
          exit 1

  # ── CI Summary Gate ────────────────────────────────────────────────────────
  ci-success:
    name: CI — All Gates Passed
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-test
      - backend-sast
      - frontend-quality
      - frontend-build
      - frontend-e2e
      - docker-build
    if: always()

    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI gates failed."
            exit 1
          fi
          echo "All CI gates passed."
