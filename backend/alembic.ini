# Alembic Configuration for SolarIntel v2
# See: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts directory
script_location = alembic
version_locations = alembic/versions

# Template for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for generated migration file timestamps
timezone = UTC

# Max length of characters to use when autogenerating slugs
truncate_slug_length = 40

# sys.path is prepended with this directory
prepend_sys_path = .

# version_path_separator uses os.pathsep (: on unix, ; on windows)
version_path_separator = os

# The database URL is read from the environment via env.py
# Do NOT hardcode a database URL here — use DATABASE_URL env var instead.
sqlalchemy.url = %(DATABASE_URL)s

[post_write_hooks]
# Run ruff after generating migration files
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
