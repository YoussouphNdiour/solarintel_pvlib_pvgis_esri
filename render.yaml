services:
  # FastAPI Backend — Web Service (Free tier: cold starts after 15min idle)
  - type: web
    name: solarintel-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: frankfurt
    healthCheckPath: /api/v2/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: solarintel-db
          property: connectionString
      # Render Key Value (free) — auto-linked, no external account needed
      # Note: free tier has no disk persistence; all cached data is lost on restart
      # This is fine for SolarIntel (PVGIS cache, tariffs, alert cooldowns — all re-fetchable)
      - key: REDIS_URL
        fromService:
          name: solarintel-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ARCGIS_API_KEY
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: '["https://solarintel-frontend.onrender.com"]'
      - key: PDF_STORAGE_PATH
        value: "/tmp/solarintel/reports"

  # React Frontend — Static Site (Free — CDN-served, no cold starts)
  - type: web
    name: solarintel-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://solarintel-backend.onrender.com"
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Render Key Value — Redis-compatible cache (Free tier: no disk persistence)
  # Valkey 8, allkeys-lru eviction, same region as backend for low latency
  - type: redis
    name: solarintel-redis
    plan: free
    region: frankfurt
    maxmemoryPolicy: allkeys-lru

databases:
  # PostgreSQL — Render managed DB (Free tier: 1GB storage, 90-day expiry)
  # Upgrade to $7/mo Starter plan for persistent production database
  - name: solarintel-db
    databaseName: solarintel
    user: solarintel
    plan: free
    region: frankfurt
