name: solarintel-v2

# SolarIntel v2 — Docker Compose Development Stack
# Services: postgres, redis, backend (FastAPI), frontend (Vite dev server)
#
# Usage:
#   docker compose up --build          # Start all services
#   docker compose up backend          # Start only backend + deps
#   docker compose logs -f backend     # Stream backend logs
#   docker compose exec backend bash   # Shell into backend container

x-common-env: &common-env
  ENVIRONMENT: development

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: solarintel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: solarintel
      POSTGRES_PASSWORD: solarintel_dev_password
      POSTGRES_DB: solarintel
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solarintel -d solarintel"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: solarintel-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: solarintel-backend
    restart: unless-stopped
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://solarintel:solarintel_dev_password@postgres:5432/solarintel
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production-min-32-chars}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ARCGIS_API_KEY: ${ARCGIS_API_KEY:-}
      PVGIS_BASE_URL: https://re.jrc.ec.europa.eu/api/v5_2
      ALLOWED_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
      DEBUG: "true"
    volumes:
      # Mount source for hot reload in development
      - ./backend:/app
      - /tmp/solarintel/reports:/tmp/solarintel/reports
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import httpx; httpx.get('http://localhost:8000/api/v2/health').raise_for_status()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Development override: use uvicorn --reload for hot reload
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--log-level",
        "info",
      ]

  # ── Frontend (Vite dev server) ────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: solarintel-frontend
    working_dir: /app
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_ARCGIS_API_KEY: ${ARCGIS_API_KEY:-}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  # ── Alembic migrations (run-once service) ────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    container_name: solarintel-migrate
    environment:
      DATABASE_URL: postgresql+asyncpg://solarintel:solarintel_dev_password@postgres:5432/solarintel
      SECRET_KEY: dev-secret-key-change-in-production-min-32-chars
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: placeholder
      ARCGIS_API_KEY: placeholder
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    profiles:
      # Run with: docker compose --profile migrate up migrate
      - migrate
    restart: "no"

  # ── Prometheus (monitoring profile) ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: solarintel-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    profiles:
      - monitoring
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"

  # ── Grafana (monitoring profile) ────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: solarintel-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: solarintel
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    profiles:
      - monitoring
    depends_on:
      - prometheus

volumes:
  postgres_data:
    name: solarintel-postgres-data
  redis_data:
    name: solarintel-redis-data
  frontend_node_modules:
    name: solarintel-frontend-node-modules
  prometheus_data:
    name: solarintel-prometheus-data
  grafana_data:
    name: solarintel-grafana-data
